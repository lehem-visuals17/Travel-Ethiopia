<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --text-main: #333;
            --text-sub: #666;
            --accent-gold: #f4b400;
            --grad-start: #eab308;
            --grad-end: #dc2626;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            width: 450px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .image-container {
            position: relative;
            height: 250px;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rating-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: white;
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .rating-badge span { color: var(--accent-gold); }

        .title-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .content {
            padding: 25px;
        }

        .description {
            color: var(--text-sub);
            line-height: 1.5;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            color: var(--text-main);
            font-weight: 500;
        }

        .icon {
            color: var(--accent-gold);
            width: 20px;
            text-align: center;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, var(--grad-start), var(--grad-end));
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="image-container">
        <!-- Placeholder for the savanna sunset image -->
        <img src="https://unsplash.com" alt="Gondar Savanna" class="hero-img">
        <div class="rating-badge">
            <span>★</span> 4.7
        </div>
        <div class="title-overlay">Gondar</div>
    </div>

    <div class="content">
        <p class="description">
            Medieval castles and churches known as the "Camelot of Africa"
        </p>

        <div class="info-row">
            <span class="icon">$</span>
            $120-200/day
        </div>

        <div class="info-row">
            <span class="icon">📅</span>
            Best: October - May
        </div>

        <button class="btn">Explore Destination</button>
    </div>
</div>

</body>
</html>
